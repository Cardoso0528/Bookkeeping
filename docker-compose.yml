version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bookkeeping
      POSTGRES_USER: bookkeeping_user
      POSTGRES_PASSWORD: bookkeeping_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookkeeping
      SPRING_DATASOURCE_USERNAME: bookkeeping_user
      SPRING_DATASOURCE_PASSWORD: bookkeeping_pass
    depends_on:
      - postgres

volumes:
  postgres_data: